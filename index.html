<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enterprise Dashboard Portal</title>

<style>

/* ===== GLOBAL ===== */
body {
    margin:0;
    font-family: Segoe UI;
    background:#0f172a;
    color:white;
}

/* ===== LOGIN PAGE ===== */
.login-page {
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#002050,#0078D4);
}

.login-box {
    width:350px;
    padding:30px;
    border-radius:12px;
    backdrop-filter:blur(20px);
    background:rgba(255,255,255,0.1);
    box-shadow:0 8px 30px rgba(0,0,0,0.3);
    animation:fadeIn 0.8s ease;
}

.login-box h2 {
    text-align:center;
    margin-bottom:20px;
}

.login-box input {
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:6px;
    outline:none;
}

.login-box button {
    width:100%;
    padding:12px;
    background:#0078D4;
    border:none;
    color:white;
    cursor:pointer;
    border-radius:6px;
}

.error {
    color:#ff6b6b;
    font-size:14px;
    display:none;
}

/* ===== MAIN APP ===== */
#app {
    display:none;
}

/* HEADER */
header {
    background:#002050;
    display:flex;
    justify-content:space-between;
    padding:15px 20px;
}

/* SIDEBAR */
.sidebar {
    width:250px;
    background:#ffffff;
    color:black;
    overflow-y:auto;
}

/* DEPTS */
.department { border-bottom:1px solid #ccc; }
.dept-header { padding:14px; cursor:pointer; font-weight:bold; }
.dashboard-list { max-height:0; overflow:hidden; transition:0.4s;}
.department.open .dashboard-list { max-height:300px; }

.dashboard-item { padding:10px 20px; cursor:pointer; }
.dashboard-item:hover { background:#eee; }
.dashboard-item.active { background:#0078D4; color:white; }

/* MAIN */
.container { display:flex; height:calc(100vh - 60px); }
.main { flex:1; padding:20px; }
.dashboard-box iframe {
    width: 100%;
    height: 100%;
    border: none;
}

    

/* BUTTON */
.btn { background:#0078D4; color:white; padding:8px; border:none;}

/* ANIM */
@keyframes fadeIn {
    from { opacity:0; transform:translateY(20px);}
    to { opacity:1; transform:translateY(0);}
}

</style>

<script>

const URL="https://app.powerbi.com/reportEmbed?reportId=d8f71bdf-009f-41eb-a07e-a9899f7644ed&autoAuth=true&ctid=68e431e8-d632-483e-ae79-f28a7b4c69e6&zoomLevel=pageWidth";

/* LOGIN */
function login(){
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    if(!email.endsWith("@l-acoustics.com")){
        showError("Use company email");
        return;
    }

    if(password !== "Massy@1234"){
        showError("Invalid password");
        return;
    }

    localStorage.setItem("auth","true");
    openApp();
}

function showError(msg){
    const err = document.getElementById("error");
    err.innerText = msg;
    err.style.display = "block";
}

/* APP */
function openApp(){
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
}

function logout(){
    localStorage.removeItem("auth");
    location.reload();
}

function toggleDept(el){
    el.parentElement.classList.toggle("open");
}

function loadDashboard(el){
    frame.src = URL;
    document.querySelectorAll(".dashboard-item").forEach(i=>i.classList.remove("active"));
    el.classList.add("active");
}

/* AUTO LOGIN */
window.onload=()=>{
    if(localStorage.getItem("auth")==="true"){
        openApp();
    }
};

</script>

</head>

<body>

<!-- LOGIN -->
<div id="login" class="login-page">
<div class="login-box">
<h2>Enterprise Portal Login</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<div id="error" class="error"></div>

<button onclick="login()">Login</button>
</div>
</div>


<!-- MAIN APP -->
<div id="app">

<header>
<span>📊 Enterprise Dashboard</span>
<button class="btn" onclick="logout()">Logout</button>
</header>

<div class="container">

<div class="sidebar">

<script>
const depts=["Finance","Sales","Procurement","IT","Operations"];

document.write(depts.map(d=>`
<div class="department">
<div class="dept-header" onclick="toggleDept(this)">${d}</div>
<div class="dashboard-list">
<div class="dashboard-item" onclick="loadDashboard(this)">Dashboard 1</div>
<div class="dashboard-item" onclick="loadDashboard(this)">Dashboard 2</div>
<div class="dashboard-item" onclick="loadDashboard(this)">Dashboard 3</div>
<div class="dashboard-item" onclick="loadDashboard(this)">Dashboard 4</div>
</div>
</div>
`).join(""));
</script>

</div>

<div class="main">
<div class="dashboard-box">
<iframe id="frame" src=""></iframe>
</div>
</div>

</div>

</div>

</body>
</html>
