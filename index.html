<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enterprise Dashboard Portal</title>

<style>
:root {
  --bg:#f4f6f8;
  --text:#000;
  --card:#fff;
  --header:#002050;
  --accent:#0078D4;
}

body.dark {
  --bg:#1e1e1e;
  --text:#fff;
  --card:#2c2c2c;
  --header:#111827;
}

body {
  margin:0;
  font-family:Segoe UI, Arial;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
header {
  background:var(--header);
  color:white;
  padding:15px 25px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* LOGIN PAGE */
.login-page {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#002050,#0078D4);
}

.login-box {
  background:white;
  padding:30px;
  width:300px;
  border-radius:10px;
  text-align:center;
}

.login-box input {
  width:100%;
  padding:10px;
  margin:10px 0;
}

.login-box button {
  width:100%;
  padding:10px;
  background:#0078D4;
  color:white;
  border:none;
  cursor:pointer;
}

.error {
  color:red;
  display:none;
}

/* MAIN LAYOUT */
.container {
  display:flex;
  height:calc(100vh - 60px);
}

.sidebar {
  width:260px;
  background:var(--card);
  border-right:1px solid #ccc;
  overflow-y:auto;
}

.department {
  border-bottom:1px solid #ddd;
}

.dept-header {
  padding:14px;
  cursor:pointer;
  font-weight:bold;
}

.dashboard-list {
  max-height:0;
  overflow:hidden;
  transition:max-height 0.3s;
}

.department.open .dashboard-list {
  max-height:300px;
}

.dashboard-item {
  padding:10px 20px;
  cursor:pointer;
}

.dashboard-item:hover {
  background:rgba(0,120,212,0.2);
}

.dashboard-item.active {
  background:var(--accent);
  color:white;
}

.main {
  flex:1;
  padding:20px;
}

.dashboard-box {
  position:relative;
  height:85vh;
  background:var(--card);
  border-radius:8px;
  overflow:hidden;
}

/* CRITICAL: DO NOT REMOVE */
iframe {
  width:100%;
  height:100%;
  border:none;
}

/* Loader */
.loader {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  display:none;
  font-size:18px;
}

/* Buttons */
.toggle-btn, .open-btn {
  background:var(--accent);
  border:none;
  color:white;
  padding:8px 12px;
  cursor:pointer;
}

/* Top section */
.top {
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

  
/* Hamburger button */
.menu-btn {
  font-size:20px;
  background:none;
  border:none;
  color:white;
  cursor:pointer;
}

/* Smooth layout transition */
.sidebar {
  transition: all 0.3s ease;
}

/* Hide sidebar */
.sidebar.collapsed {
  width:0;
  padding:0;
  overflow:hidden;
}

/* Expand main */
.main.expanded {
  width:100%;
}

</style>

<script>

/* ✅ DASHBOARDS (ADD MORE HERE IF NEEDED) */
const DASHBOARDS = {
  "Dashboard 1": "https://app.powerbi.com/reportEmbed?reportId=2f023e10-b332-48db-82ee-8b5177167d0f&autoAuth=true&ctid=68e431e8-d632-483e-ae79-f28a7b4c69e6",
  "Dashboard 2": "https://app.powerbi.com/reportEmbed?reportId=2f023e10-b332-48db-82ee-8b5177167d0f&autoAuth=true&ctid=68e431e8-d632-483e-ae79-f28a7b4c69e6",
  "Dashboard 3": "https://app.powerbi.com/reportEmbed?reportId=2f023e10-b332-48db-82ee-8b5177167d0f&autoAuth=true&ctid=68e431e8-d632-483e-ae79-f28a7b4c69e6",
  "Dashboard 4": "https://app.powerbi.com/reportEmbed?reportId=d8f71bdf-009f-41eb-a07e-a9899f7644ed"
};

/* LOGIN */
function login(){
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;

  if(email.endsWith("@l-acoustics.com") && pass === "Massy@123"){
    localStorage.setItem("auth","true");
    showApp();
  } else {
    document.getElementById("error").style.display="block";
  }
}

/* SHOW APP */
function showApp(){
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
}

/* LOGOUT */
function logout(){
  localStorage.removeItem("auth");
  location.reload();
}

/* LOAD DASHBOARD */
function loadDashboard(el){
  const loader = document.getElementById("loader");
  const frame = document.getElementById("frame");

  loader.style.display="block";

  const name = el.innerText;
  const url = DASHBOARDS[name];

  frame.onload = () => loader.style.display="none";

  frame.src = url;
  document.getElementById("openLink").href = url;

  document.querySelectorAll(".dashboard-item").forEach(i=>i.classList.remove("active"));
  el.classList.add("active");
}

/* TOGGLE DEPARTMENT */
function toggleDept(el){
  el.parentElement.classList.toggle("open");
}

/* DARK MODE */
function toggleDark(){
  document.body.classList.toggle("dark");
}

/* AUTO LOAD */
window.onload = function(){

  if(localStorage.getItem("auth")==="true"){
    showApp();
  }

  setTimeout(()=>{
    const first = document.querySelector(".dashboard-item");
    if(first){
      first.click();
    }
  },300);
};


function toggleSidebar(){
  document.querySelector(".sidebar").classList.toggle("collapsed");
  document.querySelector(".main").classList.toggle("expanded");
}

</script>
</head>

<body>

<!-- ✅ LOGIN PAGE -->
<div id="login" class="login-page">
  <div class="login-box">
    <h3>Login</h3>
    <input id="email" placeholder="Email">
    <input id="pass" type="password" placeholder="Password">
    <div id="error" class="error">Invalid credentials</div>
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- ✅ MAIN APP -->
<div id="app" style="display:none;">

<header>
 <div style="display:flex; align-items:center; gap:10px;">
   <button class="menu-btn" onclick="toggleSidebar()">☰</button>
   <span>📊 Enterprise Dashboard Portal</span>
 </div>

 <div>
    <button class="toggle-btn" onclick="toggleDark()">🌓</button>
    <button class="toggle-btn" onclick="logout()">Logout</button>
  </div>
</header>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
<script>
const departments=["Finance","Sales","Procurement","IT","Operations"];
document.write(departments.map(dept => `
<div class="department">
  <div class="dept-header" onclick="toggleDept(this)">${dept}</div>
  <div class="dashboard-list">
    <div class="dashboard-item" onclick="loadDashboard(this)">Dashboard 1</div>
    <div class="dashboard-item" onclick="loadDashboard(this)">Dashboard 2</div>
    <div class="dashboard-item" onclick="loadDashboard(this)">Dashboard 3</div>
    <div class="dashboard-item" onclick="loadDashboard(this)">Dashboard 4</div>
  </div>
</div>
`).join(''));

  
function toggleFullScreen(){

  const box = document.querySelector(".dashboard-box");

  if (!document.fullscreenElement) {

    box.requestFullscreen().then(() => {

      // Hide everything except dashboard
      document.querySelector("header").style.display = "none";
      document.querySelector(".sidebar").style.display = "none";
      document.querySelector(".top").style.display = "none";

      // Remove padding so iframe becomes full screen
      document.querySelector(".main").style.padding = "0";

      // Expand dashboard height fully
      box.style.height = "100vh";

    }).catch(err => {
      console.error(err);
    });

  } else {
    document.exitFullscreen();
  }
}


document.addEventListener("fullscreenchange", () => {

  if (!document.fullscreenElement) {

    document.querySelector("header").style.display = "flex";
    document.querySelector(".sidebar").style.display = "block";
    document.querySelector(".top").style.display = "flex";

    document.querySelector(".main").style.padding = "20px";
    document.querySelector(".dashboard-box").style.height = "85vh";
  }
});

</script>
</div>

<!-- MAIN CONTENT -->
<div class="main">


<div class="top">
  <h3>Dashboard Viewer</h3>

  <div style="display:flex; gap:8px;">
    <button class="open-btn" onclick="toggleFullScreen()">⛶</button>

    <a id="openLink" target="_blank">
      <button class="open-btn">Open in New Tab 🔗</button>
    </a>
  </div>
</div>


<div class="dashboard-box">
  <div id="loader" class="loader">Loading...</div>
  <iframe id="frame"></iframe>
</div>

</div>

</div>

</div>

</body>
</html>
