
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Power BI Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background-color: #f4f6f8;
    }

    header {
      background-color: #002050;
      color: white;
      padding: 16px 24px;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
    }

    .iframe-container {
      position: relative;
      width: 100%;
      height: 85vh;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      background-color: white;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    footer {
      text-align: center;
      padding: 10px;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>

<body>

  <header>
    📊 Internal Power BI Dashboard
  </header>

  <div class="container">
    <div class="iframe-container">

      <!-- ✅ Power BI Secure Embed -->
      <iframe
        src="https://app.powerbi.com/reportEmbed?reportId=2d6c874d-bc01-4e54-bd49-030c4d3c0ab9&autoAuth=true&ctid=68e431e8-d632-483e-ae79-f28a7b4c69e6"
        allowfullscreen="true">
      </iframe>

    </div>
  </div>

  <footer>
    © 2026 — Internal Use Only
  </footer>

</body>
</html>
